{% extends "base.html" %}
{% block contenido %}
<h2>Inventario</h2>
<table>
  <thead>
    <tr>
      <th>ID</th><th>Nombre</th><th>Talla</th><th>Stock</th>
    </tr>
  </thead>
  <tbody>
    {% for p in productos %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.nombre }}</td>
      <td>{{ p.talla }}</td>
      <td>{{ p.stock }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
