{% extends "base.html" %}
{% block contenido %}
<h2>Gestión de Productos</h2>
<table>
  <thead>
    <tr>
      <th>ID</th><th>Nombre</th><th>Precio</th><th>Talla</th><th>Stock</th><th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    {% for p in productos %}
    <tr>
      <td>{{ p.id }}</td>
      <td>{{ p.nombre }}</td>
      <td>${{ p.precio }}</td>
      <td>{{ p.talla }}</td>
      <td>{{ p.stock }}</td>
      <td>
        <a href="#">✏️ Editar</a> | <a href="#">🗑 Eliminar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
