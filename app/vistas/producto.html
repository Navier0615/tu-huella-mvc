{% extends "base.html" %}
{% block title %}{{ producto.nombre }}{% endblock %}
{% block contenido %}
  <div class="panel-detalle">
    <img src="{{ producto.imagen or url_for('static', filename='images/default.png') }}" alt="{{ producto.nombre }}">
    <div>
      <h2>{{ producto.nombre }}</h2>
      <p class="price">${{ "%.2f"|format(producto.precio) }}</p>
      <p>Talla: {{ producto.talla }} • Stock: {{ producto.stock }}</p>
      <form action="{{ url_for('carrito.agregar_al_carrito') }}" method="post">
        <input type="hidden" name="id" value="{{ producto.id }}">
        <label>Cantidad</label>
        <input type="number" name="cantidad" value="1" min="1" max="{{ producto.stock }}">
        <button class="btn">Agregar al carrito</button>
      </form>
    </div>
  </div>
{% endblock %}
